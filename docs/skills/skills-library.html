<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Claude Skills Library</title>
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=DM+Mono:wght@300;400;500&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #0a0a0f;
    --surface: #111118;
    --surface2: #1a1a24;
    --border: #2a2a3a;
    --accent: #6c63ff;
    --accent2: #ff6584;
    --accent3: #43e97b;
    --accent4: #f7971e;
    --text: #e8e8f0;
    --muted: #6b6b80;
    --tag-bg: rgba(108,99,255,0.12);
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    font-family: 'DM Mono', monospace;
    background: var(--bg);
    color: var(--text);
    min-height: 100vh;
    overflow-x: hidden;
  }

  /* GRID BG */
  body::before {
    content: '';
    position: fixed;
    inset: 0;
    background-image:
      linear-gradient(rgba(108,99,255,0.03) 1px, transparent 1px),
      linear-gradient(90deg, rgba(108,99,255,0.03) 1px, transparent 1px);
    background-size: 40px 40px;
    pointer-events: none;
    z-index: 0;
  }

  .container {
    max-width: 1200px;
    margin: 0 auto;
    padding: 0 24px;
    position: relative;
    z-index: 1;
  }

  /* HEADER */
  header {
    padding: 60px 0 40px;
    text-align: center;
    position: relative;
  }

  .badge {
    display: inline-block;
    font-size: 10px;
    font-weight: 500;
    letter-spacing: 3px;
    text-transform: uppercase;
    color: var(--accent);
    border: 1px solid rgba(108,99,255,0.4);
    padding: 6px 16px;
    border-radius: 100px;
    margin-bottom: 24px;
    background: rgba(108,99,255,0.06);
  }

  h1 {
    font-family: 'Syne', sans-serif;
    font-size: clamp(2.5rem, 6vw, 5rem);
    font-weight: 800;
    line-height: 1;
    letter-spacing: -2px;
    margin-bottom: 16px;
    background: linear-gradient(135deg, #fff 0%, rgba(255,255,255,0.5) 100%);
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    background-clip: text;
  }

  .subtitle {
    color: var(--muted);
    font-size: 14px;
    letter-spacing: 1px;
    margin-bottom: 40px;
  }

  /* SEARCH */
  .search-wrap {
    max-width: 500px;
    margin: 0 auto 48px;
    position: relative;
  }

  .search-wrap input {
    width: 100%;
    background: var(--surface);
    border: 1px solid var(--border);
    color: var(--text);
    font-family: 'DM Mono', monospace;
    font-size: 13px;
    padding: 14px 48px 14px 20px;
    border-radius: 12px;
    outline: none;
    transition: border-color 0.2s;
  }

  .search-wrap input:focus {
    border-color: var(--accent);
    box-shadow: 0 0 0 3px rgba(108,99,255,0.1);
  }

  .search-icon {
    position: absolute;
    right: 16px;
    top: 50%;
    transform: translateY(-50%);
    color: var(--muted);
    font-size: 16px;
  }

  /* CATEGORY TABS */
  .tabs {
    display: flex;
    gap: 8px;
    flex-wrap: wrap;
    justify-content: center;
    margin-bottom: 48px;
  }

  .tab {
    cursor: pointer;
    font-family: 'DM Mono', monospace;
    font-size: 11px;
    font-weight: 500;
    letter-spacing: 1.5px;
    text-transform: uppercase;
    padding: 8px 20px;
    border-radius: 100px;
    border: 1px solid var(--border);
    background: transparent;
    color: var(--muted);
    transition: all 0.2s;
    display: flex;
    align-items: center;
    gap: 8px;
  }

  .tab:hover { color: var(--text); border-color: var(--accent); }
  .tab.active {
    background: var(--accent);
    border-color: var(--accent);
    color: #fff;
  }

  .tab .dot {
    width: 6px; height: 6px;
    border-radius: 50%;
    background: currentColor;
    opacity: 0.7;
  }

  /* GRID */
  .skills-grid {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(340px, 1fr));
    gap: 20px;
    margin-bottom: 80px;
  }

  /* CARD */
  .card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 16px;
    padding: 28px;
    cursor: pointer;
    transition: all 0.25s cubic-bezier(0.4,0,0.2,1);
    position: relative;
    overflow: hidden;
    display: flex;
    flex-direction: column;
    gap: 16px;
    animation: fadeIn 0.4s ease both;
  }

  @keyframes fadeIn {
    from { opacity: 0; transform: translateY(12px); }
    to { opacity: 1; transform: translateY(0); }
  }

  .card::before {
    content: '';
    position: absolute;
    top: 0; left: 0; right: 0;
    height: 1px;
    background: linear-gradient(90deg, transparent, var(--cat-color, var(--accent)), transparent);
    opacity: 0;
    transition: opacity 0.3s;
  }

  .card:hover {
    border-color: var(--cat-color, var(--accent));
    transform: translateY(-4px);
    box-shadow: 0 20px 40px rgba(0,0,0,0.4), 0 0 0 1px var(--cat-color, var(--accent));
  }

  .card:hover::before { opacity: 1; }

  .card-header {
    display: flex;
    align-items: flex-start;
    justify-content: space-between;
    gap: 12px;
  }

  .card-icon {
    width: 44px; height: 44px;
    border-radius: 12px;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 22px;
    flex-shrink: 0;
    background: var(--icon-bg, rgba(108,99,255,0.12));
  }

  .card-meta {
    flex: 1;
  }

  .card-name {
    font-family: 'Syne', sans-serif;
    font-size: 16px;
    font-weight: 700;
    color: var(--text);
    margin-bottom: 2px;
    letter-spacing: -0.3px;
  }

  .card-category {
    font-size: 10px;
    letter-spacing: 2px;
    text-transform: uppercase;
    color: var(--cat-color, var(--accent));
    font-weight: 500;
  }

  .card-status {
    font-size: 9px;
    letter-spacing: 1px;
    text-transform: uppercase;
    padding: 4px 10px;
    border-radius: 100px;
    font-weight: 500;
    flex-shrink: 0;
  }

  .status-available { background: rgba(67,233,123,0.12); color: #43e97b; border: 1px solid rgba(67,233,123,0.2); }
  .status-soon { background: rgba(247,151,30,0.12); color: #f7971e; border: 1px solid rgba(247,151,30,0.2); }
  .status-beta { background: rgba(108,99,255,0.12); color: #6c63ff; border: 1px solid rgba(108,99,255,0.2); }

  .card-desc {
    font-size: 12px;
    line-height: 1.7;
    color: var(--muted);
  }

  .card-triggers {
    display: flex;
    flex-wrap: wrap;
    gap: 6px;
  }

  .trigger-tag {
    font-size: 10px;
    padding: 4px 10px;
    border-radius: 6px;
    background: var(--tag-bg);
    color: var(--accent);
    letter-spacing: 0.5px;
    border: 1px solid rgba(108,99,255,0.15);
  }

  .card-footer {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding-top: 16px;
    border-top: 1px solid var(--border);
    margin-top: auto;
  }

  .card-path {
    font-size: 10px;
    color: var(--muted);
    font-family: 'DM Mono', monospace;
    opacity: 0.6;
  }

  .card-arrow {
    color: var(--cat-color, var(--accent));
    font-size: 18px;
    transition: transform 0.2s;
  }

  .card:hover .card-arrow { transform: translateX(4px); }

  /* STATS BAR */
  .stats-bar {
    display: flex;
    gap: 32px;
    justify-content: center;
    padding: 24px 0;
    border-top: 1px solid var(--border);
    border-bottom: 1px solid var(--border);
    margin-bottom: 48px;
    flex-wrap: wrap;
  }

  .stat {
    text-align: center;
  }

  .stat-num {
    font-family: 'Syne', sans-serif;
    font-size: 28px;
    font-weight: 800;
    color: var(--text);
    letter-spacing: -1px;
    display: block;
  }

  .stat-label {
    font-size: 10px;
    color: var(--muted);
    text-transform: uppercase;
    letter-spacing: 2px;
  }

  /* EMPTY */
  .empty {
    grid-column: 1/-1;
    text-align: center;
    padding: 60px;
    color: var(--muted);
  }

  .empty-icon { font-size: 48px; margin-bottom: 16px; }

  /* MODAL */
  .modal-bg {
    display: none;
    position: fixed;
    inset: 0;
    background: rgba(0,0,0,0.7);
    backdrop-filter: blur(8px);
    z-index: 100;
    align-items: center;
    justify-content: center;
    padding: 24px;
  }

  .modal-bg.open { display: flex; }

  .modal {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 20px;
    padding: 36px;
    max-width: 600px;
    width: 100%;
    position: relative;
    animation: modalIn 0.3s cubic-bezier(0.4,0,0.2,1);
    max-height: 80vh;
    overflow-y: auto;
  }

  @keyframes modalIn {
    from { opacity: 0; transform: scale(0.95) translateY(20px); }
    to { opacity: 1; transform: scale(1) translateY(0); }
  }

  .modal-close {
    position: absolute;
    top: 20px; right: 20px;
    width: 32px; height: 32px;
    border-radius: 8px;
    background: var(--surface2);
    border: 1px solid var(--border);
    color: var(--muted);
    font-size: 16px;
    cursor: pointer;
    display: flex;
    align-items: center;
    justify-content: center;
    transition: all 0.2s;
  }

  .modal-close:hover { background: var(--border); color: var(--text); }

  .modal-title {
    font-family: 'Syne', sans-serif;
    font-size: 24px;
    font-weight: 800;
    margin-bottom: 8px;
    letter-spacing: -0.5px;
  }

  .modal-cat {
    font-size: 11px;
    letter-spacing: 2px;
    text-transform: uppercase;
    color: var(--accent);
    margin-bottom: 20px;
  }

  .modal-section { margin-bottom: 20px; }
  .modal-section-title {
    font-size: 10px;
    letter-spacing: 2px;
    text-transform: uppercase;
    color: var(--muted);
    margin-bottom: 8px;
  }

  .modal-desc {
    font-size: 13px;
    line-height: 1.8;
    color: var(--muted);
  }

  .modal-cmd {
    background: var(--surface2);
    border: 1px solid var(--border);
    border-radius: 10px;
    padding: 14px 16px;
    font-size: 12px;
    color: var(--accent3);
    font-family: 'DM Mono', monospace;
    display: flex;
    align-items: center;
    gap: 10px;
  }

  .modal-cmd::before {
    content: '›';
    color: var(--muted);
    font-size: 18px;
  }

  .modal-tags {
    display: flex;
    flex-wrap: wrap;
    gap: 6px;
  }

  .count-badge {
    background: var(--surface2);
    border: 1px solid var(--border);
    border-radius: 6px;
    padding: 2px 8px;
    font-size: 10px;
    color: var(--muted);
    margin-left: 8px;
  }
</style>
</head>

</div>

<div class="modal-bg" id="modal-bg" onclick="closeModal(event)">

</div>

    icon: '🏷️', status: 'available',
    desc: 'Cria e aplica guias de marca — voz, tom, identidade visual, regras de uso de logo e brand book completo.',
    triggers: ['brand guidelines', 'guia de marca', 'identidade visual', 'brand book', 'manual de marca'],
    path: '/mnt/skills/examples/brand-guidelines/SKILL.md',
    cmd: 'crie um brand book completo para nossa startup de fintech',
    capabilities: ['Voz e tom', 'Paleta', 'Tipografia', 'Exemplos de uso', 'Do & Dont'],
  },
  {
    id: 18, name: 'Benepass Reimbursement', cat: 'automation',
    icon: '💳', status: 'available',
    desc: 'Automatiza processos de reembolso — analisa recibos, categoriza despesas e gera relatórios de reembolso.',
    triggers: ['reembolso', 'recibo', 'despesas', 'expense report', 'benepass'],
    path: '/mnt/skills/examples/benepass-reimbursement/SKILL.md',
    cmd: 'analise esses recibos e gere um relatório de reembolso mensal',
    capabilities: ['Análise de recibos', 'Categorização', 'Relatórios', 'CSV export'],
  },
  {
    id: 19, name: 'Product Self-Knowledge', cat: 'automation',
    icon: '🤖', status: 'available',
    desc: 'Knowledge base atualizada sobre produtos Anthropic — Claude API, Claude Code, planos e capacidades. Evita informações desatualizadas.',
    triggers: ['claude api', 'preços anthropic', 'claude code', 'planos claude', 'modelos claude'],
    path: '/mnt/skills/public/product-self-knowledge/SKILL.md',
    cmd: 'quais são os modelos Claude disponíveis na API e seus limites?',
    capabilities: ['API docs', 'Pricing', 'Rate limits', 'Models', 'Features'],
  },
];

let activeCategory = 'all';
let searchQuery = '';

function init() {
  renderTabs();
  renderGrid();
  updateStats();
}

function renderTabs() {
  const tabsEl = document.getElementById('tabs');
  const counts = {};
  skills.forEach(s => {
    counts[s.cat] = (counts[s.cat] || 0) + 1;
  });

  tabsEl.innerHTML = Object.entries(categories).map(([key, cat]) => {
    const count = key === 'all' ? skills.length : (counts[key] || 0);
    return `<button class="tab ${key === activeCategory ? 'active' : ''}" onclick="setCategory('${key}')">
      <span class="dot"></span>${cat.icon} ${cat.label}
      <span class="count-badge">${count}</span>
    </button>`;
  }).join('');
}

function setCategory(cat) {
  activeCategory = cat;
  renderTabs();
  renderGrid();
}

function filterSkills() {
  searchQuery = document.getElementById('search').value.toLowerCase();
  renderGrid();
}

function renderGrid() {
  const grid = document.getElementById('grid');
  let filtered = skills.filter(s => {
    const matchCat = activeCategory === 'all' || s.cat === activeCategory;
    const matchSearch = !searchQuery ||
      s.name.toLowerCase().includes(searchQuery) ||
      s.desc.toLowerCase().includes(searchQuery) ||
      s.triggers.some(t => t.toLowerCase().includes(searchQuery)) ||
      categories[s.cat].label.toLowerCase().includes(searchQuery);
    return matchCat && matchSearch;
  });

  if (filtered.length === 0) {
    grid.innerHTML = `<div class="empty">
      <div class="empty-icon">◌</div>
      <p>Nenhuma skill encontrada para "<strong>${searchQuery}</strong>"</p>
    </div>`;
    return;
  }

  grid.innerHTML = filtered.map((s, i) => {
    const cat = categories[s.cat];
    const statusMap = { available: ['status-available', '● ativo'], soon: ['status-soon', '◎ em breve'], beta: ['status-beta', '⬡ beta'] };
    const [statusClass, statusLabel] = statusMap[s.status];

    return `<div class="card" style="--cat-color:${cat.color};--icon-bg:${cat.color}18;animation-delay:${i * 0.04}s" onclick="openModal(${s.id})">
      <div class="card-header">
        <div class="card-icon">${s.icon}</div>
        <div class="card-meta">
          <div class="card-name">${s.name}</div>
          <div class="card-category">${cat.icon} ${cat.label}</div>
        </div>
        <span class="card-status ${statusClass}">${statusLabel}</span>
      </div>
      <div class="card-desc">${s.desc}</div>
      <div class="card-triggers">
        ${s.triggers.slice(0,4).map(t => `<span class="trigger-tag" style="background:${cat.color}12;color:${cat.color};border-color:${cat.color}22">${t}</span>`).join('')}
      </div>
      <div class="card-footer">
        <span class="card-path">${s.path.replace('/mnt/skills/', '')}</span>
        <span class="card-arrow">→</span>
      </div>
    </div>`;
  }).join('');
}

function updateStats() {
  document.getElementById('total-count').textContent = skills.length;
  const avail = skills.filter(s => s.status === 'available').length;
  const soon = skills.filter(s => s.status === 'soon').length;
  document.querySelectorAll('.stat-num')[1].textContent = avail;
  document.querySelectorAll('.stat-num')[2].textContent = soon;
}

function openModal(id) {
  const s = skills.find(x => x.id === id);
  const cat = categories[s.cat];
  const statusMap = { available: ['status-available', '● Ativo'], soon: ['status-soon', '◎ Em breve'], beta: ['status-beta', '⬡ Beta'] };
  const [statusClass, statusLabel] = statusMap[s.status];

  document.getElementById('modal-content').innerHTML = `
    <div style="display:flex;align-items:center;gap:16px;margin-bottom:20px">
      <div class="card-icon" style="width:56px;height:56px;font-size:28px;background:${cat.color}18">${s.icon}</div>
      <div>
        <div class="modal-title">${s.name}</div>
        <div class="modal-cat">${cat.icon} ${cat.label} · <span class="card-status ${statusClass}" style="font-size:10px">${statusLabel}</span></div>
      </div>
    </div>

    <div class="modal-section">
      <div class="modal-section-title">Descrição</div>
      <div class="modal-desc">${s.desc}</div>
    </div>

    <div class="modal-section">
      <div class="modal-section-title">Capacidades</div>
      <div class="modal-tags">
        ${s.capabilities.map(c => `<span class="trigger-tag" style="background:${cat.color}12;color:${cat.color};border-color:${cat.color}22">${c}</span>`).join('')}
      </div>
    </div>

    <div class="modal-section">
      <div class="modal-section-title">Gatilhos (triggers)</div>
      <div class="modal-tags">
        ${s.triggers.map(t => `<span class="trigger-tag">${t}</span>`).join('')}
      </div>
    </div>

    <div class="modal-section">
      <div class="modal-section-title">Exemplo de uso</div>
      <div class="modal-cmd">${s.cmd}</div>
    </div>

    <div class="modal-section">
      <div class="modal-section-title">Localização do arquivo</div>
      <div class="modal-cmd" style="color:#6b6b80;font-size:11px">${s.path}</div>
    </div>
  `;

  document.getElementById('modal-bg').classList.add('open');
}

function closeModal(e) {
  if (!e || e.target === document.getElementById('modal-bg')) {
    document.getElementById('modal-bg').classList.remove('open');
  }
}

document.addEventListener('keydown', e => { if (e.key === 'Escape') closeModal(); });

init();
</script>
</body>
</html>
